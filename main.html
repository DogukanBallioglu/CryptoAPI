<!DOCTYPE html>
<html lang="tr">

<head>
    <link rel="icon" href="data:,">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin Fiyat Takibi</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        .container {
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            /* Cam efekti */
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 25px;
            letter-spacing: 1px;
            color: #00d2ff;
        }

        #coinsDiv {
            display: flex;
            flex-direction: column;
            gap: 15px;
            /* Kartlar arası boşluk */
        }

        /* Her bir Coin Satırı */
        .coin-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 18px;
            border-radius: 12px;
            transition: transform 0.2s, background 0.2s;
        }

        .coin-row:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(5px);
        }

        .coin-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .coin-logo {
            width: 32px;
            height: 32px;
            border-radius: 50%;
        }

        .coin-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .coin-price {
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: #f7931a;
        }

        /* Güncelle Butonu */
        button {
            margin-top: 30px;
            padding: 12px 24px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        button:hover {
            opacity: 0.9;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Coin Fiyatları (USD)</h1>
        <div id="coinsDiv">Yükleniyor...</div>
        <button onclick="fetchBitcoinPrice()">Fiyatları Güncelle</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
